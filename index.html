const C = {

  oGlow:"#f6540388",oDim:"#f6540333",oBg:"#f6540310",

const CRITERIA = [
  {key:"pitchClarity",  label:"Pitch Clarity",           short:"Pitch",     max:15, color:C.o300},
  {key:"innovation",    label:"Innovation & Creativity", short:"Innovation",max:15, color:C.b200},
  {key:"workflow",      label:"AI Agent Workflow",       short:"Workflow",  max:20, color:C.o400},

  {key:"businessImpact",label:"Business Impact",         short:"Business",  max:25, color:C.o200},
];
const MAX_TOTAL = 100;

const RUBRIC = {
  pitchClarity:[
    {level:"Excellent",        range:"13–15",desc:"Highly clear, well-structured, compelling, strongly connected to workplace needs. Business value communicated confidently."},
    {level:"Good",             range:"10–12",desc:"Mostly clear with minor gaps. Business value understandable. Organized with acceptable delivery."},
    {level:"Satisfactory",     range:"6–9",  desc:"Basic explanation but lacks depth, clarity, or structure. Business value somewhat vague."},
    {level:"Needs Improvement",range:"0–5",  desc:"Lacks clarity, structure, or understanding. Business value unclear or missing."},
  ],
  innovation:[
    {level:"Excellent",        range:"13–15",desc:"Highly original thinking and creative AI implementation. Unique, practical, and impactful use of AI beyond common usage."},
    {level:"Good",             range:"10–12",desc:"Creative ideas with meaningful AI usage. Some originality and practical innovation."},
    {level:"Satisfactory",     range:"6–9",  desc:"Standard or predictable AI usage with limited creativity or differentiation."},
    {level:"Needs Improvement",range:"0–5",  desc:"Minimal innovation. AI usage appears generic, copied, or unrelated to the problem."},
  ],
  workflow:[
    {level:"Excellent",        range:"17–20",desc:"Highly logical, complete, easy to understand. Clearly demonstrates user interaction, automation flow, inputs, processing, and outputs."},
    {level:"Good",             range:"13–16",desc:"Mostly clear and logical with minor missing details. AI process is understandable."},
    {level:"Satisfactory",     range:"9–12", desc:"Partially explained but lacks clarity, detail, or technical flow consistency."},
    {level:"Needs Improvement",range:"0–8",  desc:"Unclear, incomplete, confusing, or unrelated to the proposed solution."},
  ],
  demo:[
    {level:"Excellent",        range:"22–25",desc:"Functional prototype works smoothly. Confidently showcases real use cases, automation capability, and user interactions."},
    {level:"Good",             range:"17–21",desc:"Functional with minor technical issues. Covers most intended functionalities and user flow."},
    {level:"Satisfactory",     range:"11–16",desc:"Limited functionality or relies heavily on explanation. Some important features missing."},
    {level:"Needs Improvement",range:"0–10", desc:"Incomplete, non-functional, heavily dependent on slides, or unable to demonstrate actual AI agent capability."},
  ],
  businessImpact:[
    {level:"Excellent",        range:"22–25",desc:"Clearly demonstrates measurable impact — productivity gains, time savings, cost reduction, UX improvement, or operational enhancement."},
    {level:"Good",             range:"17–21",desc:"Meaningful business value and operational benefits with reasonable explanation."},
    {level:"Satisfactory",     range:"11–16",desc:"General benefits mentioned but lack measurable outcomes or implementation details."},
    {level:"Needs Improvement",range:"0–10", desc:"Business impact is weak, unrealistic, unclear, or unsupported."},
  ],
};

const emptyScores = () => ({pitchClarity:0,innovation:0,workflow:0,demo:0,businessImpact:0});
const calcTotal = s => CRITERIA.reduce((sum,c) => sum+(Number(s[c.key])||0), 0);

const DEFAULT_TEAMS = Array.from({length:140},(_,i) => ({
  id:i+1,
  name:`Team ${i+1}`,
  group:`Group ${String.fromCharCode(65+Math.floor(i/10))}`,
  scores:emptyScores(),
  finaleScores:emptyScores(),
  logo:"",
}));

function getRankColor(rank){
  if(rank===1) return {color:C.gold,  glow:C.gold};
  if(rank===2) return {color:C.silver,glow:C.silver};
  if(rank===3) return {color:C.bronze,glow:C.bronze};
  if(rank<=10) return {color:C.o300,  glow:C.o400};
  return {color:C.b200,glow:C.b400};
}

// ── CONFIG — paste your Apps Script Web App URL here ─────────
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyw5RiSpbK1RoGw5catD8ueckrRf9sWFUUwpXuXC78s5zvGxQv2rk-lP-g8GXePySTb/exec";
const CACHE_KEY  = "agentathon-cache-v2";   // localStorage cache for offline fallback

// ── GOOGLE SHEETS API LAYER ───────────────────────────────────
const API = {
  // Read all teams from the sheet
  async fetchTeams() {
    const res  = await fetch(SCRIPT_URL + "?t=" + Date.now());
    const data = await res.json();
    if (data.status !== "ok") throw new Error(data.message || "Fetch failed");
    // Cache locally as fallback
    try { localStorage.setItem(CACHE_KEY, JSON.stringify(data.teams)); } catch(_){}
    return data.teams;
  },
  // Save one team to the sheet
  async saveTeam(team) {
    const res  = await fetch(SCRIPT_URL, {
      method:  "POST",
      headers: { "Content-Type": "text/plain" },
      body:    JSON.stringify({ action: "saveTeam", team }),
    });
    const data = await res.json();
    if (data.status !== "ok") throw new Error(data.message || "Save failed");
  },
  // Reset all scores to 0
  async resetAll() {
    const res  = await fetch(SCRIPT_URL, {
      method:  "POST",
      headers: { "Content-Type": "text/plain" },
      body:    JSON.stringify({ action: "resetAll" }),
    });
    const data = await res.json();
    if (data.status !== "ok") throw new Error(data.message || "Reset failed");
  },
  // Return cached teams from localStorage (instant, used on first render)
  getCached() {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed) && parsed.length > 0)
          return parsed.map(t => ({ ...t, scores: t.scores || emptyScores() }));
      }
    } catch(_) {}
    return null;
  },
};

// Check whether the URL has been configured
const API_CONFIGURED = SCRIPT_URL !== "YOUR_APPS_SCRIPT_URL_HERE" && SCRIPT_URL.startsWith("https://");

// ── RADAR CHART ──────────────────────────────────────────────────────────────
function RadarChart({scores, size=300}){
  const cx=size/2, cy=size/2, r=size*0.36;
  const n=CRITERIA.length;
  const angle=i=>(Math.PI*2/n)*i-Math.PI/2;
  const pt=(i,ratio)=>({x:cx+r*ratio*Math.cos(angle(i)), y:cy+r*ratio*Math.sin(angle(i))});
  const rings=[0.25,0.5,0.75,1.0];

  const ringPath=ratio=>{
    const pts=CRITERIA.map((_,i)=>pt(i,ratio));
    return pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(" ")+"Z";
  };
  const dataPath=()=>{
    const pts=CRITERIA.map((c,i)=>{
      const ratio=Math.min(1,(scores[c.key]||0)/c.max);
      return pt(i,ratio);
    });
    return pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(" ")+"Z";
  };

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{overflow:"visible"}}>
      <defs>
        <linearGradient id="rfill" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stopColor={C.o400} stopOpacity="0.35"/>
          <stop offset="100%" stopColor={C.b400} stopOpacity="0.35"/>
        </linearGradient>
        <linearGradient id="rstroke" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stopColor={C.o400}/>
          <stop offset="100%" stopColor={C.b300}/>
        </linearGradient>
      </defs>
      {rings.map((ratio,ri)=>(
        <path key={ri} d={ringPath(ratio)} fill="none"
          stroke={ri===3?"#FFFFFF18":"#FFFFFF0C"} strokeWidth={ri===3?"1":"0.5"}/>
      ))}
      {CRITERIA.map((_,i)=>{
        const end=pt(i,1);
        return <line key={i} x1={cx} y1={cy} x2={end.x.toFixed(2)} y2={end.y.toFixed(2)} stroke="#FFFFFF10" strokeWidth="0.5"/>;
      })}
      {rings.map((ratio,ri)=>{
        const lp=pt(0,ratio);
        return <text key={ri} x={lp.x+4} y={lp.y} fontSize="8" fill="#FFFFFF44" fontFamily="'Share Tech Mono',monospace">{Math.round(ratio*100)}%</text>;
      })}
      <path d={dataPath()} fill="url(#rfill)" stroke="url(#rstroke)" strokeWidth="2" strokeLinejoin="round"/>
      {CRITERIA.map((c,i)=>{
        const ratio=Math.min(1,(scores[c.key]||0)/c.max);
        const p=pt(i,ratio);
        return (
          <g key={i}>
            <circle cx={p.x} cy={p.y} r="4" fill={C.bg} stroke={C.o400} strokeWidth="1.5"/>
            <circle cx={p.x} cy={p.y} r="2" fill={C.o300}/>
          </g>
        );
      })}
      {CRITERIA.map((c,i)=>{
        const lp=pt(i,1.24);
        const cosA=Math.cos(angle(i));
        const anchor=Math.abs(cosA)<0.1?"middle":cosA<0?"end":"start";
        return (
          <g key={i}>
            <text x={lp.x} y={lp.y-6} textAnchor={anchor} fontSize="9"
              fontFamily="'Orbitron',monospace" fill={C.o300} letterSpacing="0.05em">{c.short}</text>
            <text x={lp.x} y={lp.y+7} textAnchor={anchor} fontSize="8"
              fontFamily="'Share Tech Mono',monospace" fill={C.muted}>{scores[c.key]||0}/{c.max}</text>
          </g>
        );
      })}
    </svg>
  );
}

    <div style={{display:"flex",alignItems:"flex-end",justifyContent:"center",gap:"10px",marginBottom:"40px",padding:"0 16px"}}>
      {order.map((idx,pos)=>{
        const team=top3[idx]; if(!team) return null;
        const col=colors[pos], total=calcTotal(team.scores);
        return (
          <div key={team.id} style={{display:"flex",flexDirection:"column",alignItems:"center",flex:1,maxWidth:"220px"}}>
            <div style={{fontSize:"9px",color:C.muted,letterSpacing:".25em",marginBottom:"6px",fontFamily:"'Orbitron',monospace"}}>RANK</div>

                  <img src={team.logo} alt={team.name} style={{width:"100%",height:"100%",objectFit:"contain",padding:"5px"}} onError={e=>{e.target.parentNode.innerHTML=`<span style="font-family:'Orbitron',monospace;font-size:21px;font-weight:900;color:${col}">${idx+1}</span>`;}}/>
                </div>
              : <div style={{width:"52px",height:"52px",borderRadius:"50%",border:`2px solid ${col}`,background:`radial-gradient(circle at 40% 35%,${col}33,transparent)`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Orbitron',monospace",fontSize:"21px",fontWeight:"900",color:col,boxShadow:`0 0 22px ${col}55`,marginBottom:"10px"}}>{idx+1}</div>
            }
            <div style={{fontFamily:"'Orbitron',monospace",fontSize:"10px",color:"#fff",textAlign:"center",marginBottom:"4px",letterSpacing:".05em",maxWidth:"160px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{team.name}</div>
            <div style={{fontSize:"12px",color:col,marginBottom:"10px",textShadow:`0 0 8px ${col}88`,fontFamily:"'Share Tech Mono',monospace"}}>{total}/{MAX_TOTAL} pts</div>
            <div style={{width:"100%",height:heights[pos],background:`linear-gradient(to top,${col}1A,transparent)`,border:`1px solid ${col}44`,borderBottom:"none",borderRadius:"4px 4px 0 0",display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:"10px"}}>
              <span style={{fontFamily:"'Orbitron',monospace",fontSize:"9px",letterSpacing:".3em",color:`${col}88`}}>{labels[pos]}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── SCORE EDITOR ─────────────────────────────────────────────────────────────
function ScoreEditor({team,onSave,onCancel}){
  const [scoreTab,setScoreTab]=useState("leaderboard"); // "leaderboard" | "finale"
  const [draft,setDraft]=useState({...team.scores});
  const [finaleDraft,setFinaleDraft]=useState({...( team.finaleScores||emptyScores())});
  const [editName,setEditName]=useState(team.name);
  const [editGroup,setEditGroup]=useState(team.group);
  const [editLogo,setEditLogo]=useState(team.logo||"");
  const [logoError,setLogoError]=useState(false);
  const [showRubric,setShowRubric]=useState(null);

  const lbTotal=calcTotal(draft);
  const fnTotal=calcTotal(finaleDraft);

  const setScore=(key,val,isFinale)=>{
    const c=CRITERIA.find(x=>x.key===key);
    const clamped=Math.max(0,Math.min(c.max,Number(val)||0));
    if(isFinale) setFinaleDraft(d=>({...d,[key]:clamped}));
    else setDraft(d=>({...d,[key]:clamped}));
  };

  // Reusable criteria grid for either score set
  const CriteriaGrid=({draftScores,isFinale,accentColor})=>(
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"16px"}}>
      {CRITERIA.map(c=>(
        <div key={c.key} style={{background:C.bg,border:`1px solid ${C.dim}`,borderRadius:"4px",padding:"10px 12px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}}>
            <span style={{fontSize:"10px",color:C.text}}>{c.label}</span>
            <button onClick={()=>setShowRubric(showRubric===c.key?null:c.key)}
              style={{background:"transparent",border:`1px solid ${C.b400}44`,color:C.b200,padding:"2px 7px",cursor:"pointer",borderRadius:"2px",fontSize:"9px",fontFamily:"'Orbitron',monospace",letterSpacing:".1em"}}>
              {showRubric===c.key?"HIDE":"INFO"}
            </button>
          </div>
          {showRubric===c.key&&(
            <div style={{marginBottom:"8px",background:C.bg2,border:`1px solid ${C.dim}`,borderRadius:"3px",padding:"8px"}}>
              {RUBRIC[c.key].map(r=>(
                <div key={r.level} style={{marginBottom:"6px",paddingBottom:"6px",borderBottom:`1px solid ${C.dim}33`}}>
                  <div style={{display:"flex",gap:"6px",marginBottom:"2px"}}>
                    <span style={{fontSize:"9px",color:r.level==="Excellent"?C.o300:r.level==="Good"?C.b200:r.level==="Satisfactory"?C.muted:C.dim,fontFamily:"'Orbitron',monospace",letterSpacing:".1em"}}>{r.level}</span>
                    <span style={{fontSize:"9px",color:C.o400,fontFamily:"'Share Tech Mono',monospace"}}>[{r.range}]</span>
                  </div>
                  <div style={{fontSize:"9px",color:C.muted,lineHeight:"1.4"}}>{r.desc}</div>
                </div>
              ))}
            </div>
          )}
          <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
            <input type="number" min="0" max={c.max} value={draftScores[c.key]}
              onChange={e=>setScore(c.key,e.target.value,isFinale)}
              className="cyber-input"
              style={{width:"70px",padding:"5px 8px",fontSize:"14px",textAlign:"center",fontFamily:"'Orbitron',monospace",color:accentColor}}/>
            <span style={{fontSize:"10px",color:C.muted}}>/ {c.max}</span>
            <div style={{flex:1,height:"4px",background:C.dim,borderRadius:"2px"}}>
              <div style={{height:"100%",width:`${Math.round(((draftScores[c.key]||0)/c.max)*100)}%`,background:`linear-gradient(90deg,${accentColor},${accentColor}88)`,borderRadius:"2px"}}/>
            </div>
          </div>
        </div>
      ))}
    </div>
  );

  return (
    <div style={{background:C.bg2,border:`1px solid ${C.o400}33`,borderTop:`2px solid ${C.o400}`,borderRadius:"6px",padding:"20px",animation:"slideDown .25s ease"}}>
      <div style={{fontSize:"9px",color:C.o400,letterSpacing:".25em",fontFamily:"'Orbitron',monospace",marginBottom:"16px"}}>EDITING · ID {String(team.id).padStart(3,"0")}</div>

      {/* Name + Group + Logo */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"16px"}}>
        <div>
          <div style={{fontSize:"9px",color:C.muted,letterSpacing:".2em",marginBottom:"5px"}}>TEAM NAME</div>
          <input className="cyber-input" value={editName} onChange={e=>setEditName(e.target.value)}/>
        </div>
        <div>
          <div style={{fontSize:"9px",color:C.muted,letterSpacing:".2em",marginBottom:"5px"}}>GROUP</div>
          <input className="cyber-input" value={editGroup} onChange={e=>setEditGroup(e.target.value)}/>
        </div>
      </div>

      {/* Logo */}
      <div style={{marginBottom:"20px",padding:"14px 16px",background:C.bg,border:`1px solid ${C.b400}33`,borderRadius:"6px"}}>
        <div style={{fontSize:"9px",color:C.b200,letterSpacing:".25em",fontFamily:"'Orbitron',monospace",marginBottom:"12px"}}>TEAM LOGO</div>
        <div style={{display:"flex",alignItems:"center",gap:"14px",flexWrap:"wrap"}}>
          <div style={{width:"64px",height:"64px",borderRadius:"50%",border:`2px solid ${editLogo&&!logoError?C.o400:C.dim}`,background:C.bg2,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",flexShrink:0}}>
            {editLogo&&!logoError
              ?<img src={editLogo} alt="logo" onError={()=>setLogoError(true)} onLoad={()=>setLogoError(false)} style={{width:"100%",height:"100%",objectFit:"contain",padding:"4px"}}/>
              :<span style={{fontSize:"22px",opacity:.4}}>🏷️</span>}
          </div>
          <div style={{flex:1,minWidth:"200px"}}>
            <div style={{fontSize:"9px",color:C.muted,letterSpacing:".1em",marginBottom:"6px"}}>Paste an image URL (PNG / JPG / SVG)</div>
            <input className="cyber-input" value={editLogo} onChange={e=>{setEditLogo(e.target.value);setLogoError(false);}} placeholder="https://example.com/logo.png" style={{fontSize:"12px"}}/>
            {logoError&&<div style={{fontSize:"9px",color:"#FF7070",marginTop:"4px"}}>⚠ Could not load image — check the URL</div>}
            {editLogo&&!logoError&&<div style={{fontSize:"9px",color:"#55EE88",marginTop:"4px"}}>✓ Logo loaded</div>}
          </div>
          {editLogo&&<button onClick={()=>{setEditLogo("");setLogoError(false);}} style={{background:"transparent",border:`1px solid ${C.dim}`,color:C.muted,padding:"4px 10px",cursor:"pointer",borderRadius:"2px",fontSize:"9px",fontFamily:"'Orbitron',monospace",letterSpacing:".1em"}}>CLEAR</button>}
        </div>
      </div>

      {/* ── DUAL SCORE TAB SWITCHER ── */}
      <div style={{display:"flex",gap:"0",marginBottom:"16px",border:`1px solid ${C.dim}`,borderRadius:"6px",overflow:"hidden"}}>
        <button onClick={()=>setScoreTab("leaderboard")} style={{
          flex:1,padding:"10px",cursor:"pointer",border:"none",
          background:scoreTab==="leaderboard"?`linear-gradient(135deg,${C.o400}22,${C.o400}0A)`:"transparent",
          borderRight:`1px solid ${C.dim}`,
          color:scoreTab==="leaderboard"?C.o300:C.muted,
          fontFamily:"'Orbitron',monospace",fontSize:"10px",letterSpacing:".2em",
          boxShadow:scoreTab==="leaderboard"?`inset 0 -2px 0 ${C.o400}`:"none",
          transition:"all .2s",
        }}>
          📊 LEADERBOARD
          <div style={{fontSize:"8px",color:scoreTab==="leaderboard"?C.o400:C.dim,marginTop:"2px",letterSpacing:".1em"}}>{lbTotal}/{MAX_TOTAL} pts</div>
        </button>
        <button onClick={()=>setScoreTab("finale")} style={{
          flex:1,padding:"10px",cursor:"pointer",border:"none",
          background:scoreTab==="finale"?`linear-gradient(135deg,${C.gold}18,${C.gold}08)`:"transparent",
          color:scoreTab==="finale"?C.gold:C.muted,
          fontFamily:"'Orbitron',monospace",fontSize:"10px",letterSpacing:".2em",
          boxShadow:scoreTab==="finale"?`inset 0 -2px 0 ${C.gold}`:"none",
          transition:"all .2s",
        }}>
          ⚡ FINALE
          <div style={{fontSize:"8px",color:scoreTab==="finale"?C.gold:C.dim,marginTop:"2px",letterSpacing:".1em"}}>{fnTotal}/{MAX_TOTAL} pts</div>
        </button>
      </div>

      {/* Leaderboard scoring */}
      {scoreTab==="leaderboard"&&(
        <div>
          <div style={{fontSize:"9px",color:C.o400,letterSpacing:".25em",fontFamily:"'Orbitron',monospace",marginBottom:"12px",display:"flex",alignItems:"center",gap:"8px"}}>
            <div style={{width:"3px",height:"12px",background:C.o400,borderRadius:"2px"}}/>
            LEADERBOARD MARKING
          </div>
          <CriteriaGrid draftScores={draft} isFinale={false} accentColor={C.o300}/>
          <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:"12px",padding:"12px",background:C.bg,border:`1px solid ${C.dim}`,borderRadius:"4px",marginBottom:"0"}}>
            <span style={{fontSize:"10px",color:C.muted,letterSpacing:".2em"}}>LEADERBOARD TOTAL:</span>
            <span style={{fontFamily:"'Orbitron',monospace",fontSize:"22px",fontWeight:"700",background:`linear-gradient(90deg,${C.o400},${C.o300})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
              {lbTotal}<span style={{fontSize:"12px",color:C.muted,WebkitTextFillColor:C.muted}}>/{MAX_TOTAL}</span>
            </span>
          </div>
        </div>
      )}

      {/* Finale scoring */}
      {scoreTab==="finale"&&(
        <div>
          <div style={{fontSize:"9px",color:C.gold,letterSpacing:".25em",fontFamily:"'Orbitron',monospace",marginBottom:"12px",display:"flex",alignItems:"center",gap:"8px"}}>
            <div style={{width:"3px",height:"12px",background:C.gold,borderRadius:"2px"}}/>
            FINALE MARKING
          </div>
          <CriteriaGrid draftScores={finaleDraft} isFinale={true} accentColor={C.gold}/>
          <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:"12px",padding:"12px",background:C.bg,border:`1px solid ${C.gold}22`,borderRadius:"4px",marginBottom:"0"}}>
            <span style={{fontSize:"10px",color:C.muted,letterSpacing:".2em"}}>FINALE TOTAL:</span>
            <span style={{fontFamily:"'Orbitron',monospace",fontSize:"22px",fontWeight:"700",background:`linear-gradient(90deg,${C.gold},${C.o300})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
              {fnTotal}<span style={{fontSize:"12px",color:C.muted,WebkitTextFillColor:C.muted}}>/{MAX_TOTAL}</span>
            </span>
          </div>
        </div>
      )}

      <div style={{display:"flex",gap:"8px",marginTop:"14px"}}>
        <button className="cyber-btn" onClick={()=>onSave({name:editName,group:editGroup,scores:draft,finaleScores:finaleDraft,logo:editLogo})}>SAVE CHANGES</button>
        <button className="cyber-btn danger" onClick={onCancel}>CANCEL</button>
      </div>
    </div>
  );
}

// ── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const [teams,setTeams]=useState(()=>API.getCached()||DEFAULT_TEAMS);
  const [view,setView]=useState("leaderboard");
  const [adminAuth,setAdminAuth]=useState(false);
  const [pwInput,setPwInput]=useState("");
  const [pwError,setPwError]=useState(false);
  const [search,setSearch]=useState("");
  const [editId,setEditId]=useState(null);
  const [selectedId,setSelectedId]=useState(null);
  const [loading,setLoading]=useState(true);
  const [syncing,setSyncing]=useState(false);
  const [saveStatus,setSaveStatus]=useState("");
  const [netError,setNetError]=useState("");
  const [lastSync,setLastSync]=useState(null);
  const [lbSearch,setLbSearch]=useState("");
  const [ticker,setTicker]=useState(0);

  // ── Initial load + auto-refresh every 30s ──────────────────
  const loadTeams = useCallback(async (silent=false)=>{
    if(!API_CONFIGURED){ setLoading(false); return; }
    if(!silent) setLoading(true);
    else setSyncing(true);
    try{
      const fresh = await API.fetchTeams();
      setTeams(fresh.map(t=>({...t,scores:t.scores||emptyScores(),finaleScores:t.finaleScores||emptyScores()})));
      setLastSync(new Date());
      setNetError("");
    }catch(err){
      setNetError("Sync failed — showing cached data");
    }finally{
      setLoading(false);
      setSyncing(false);
    }
  },[]);

  useEffect(()=>{ loadTeams(); },[]);

  // Auto-refresh every 30 seconds on the leaderboard tab
  useEffect(()=>{
    if(!API_CONFIGURED) return;
    const interval = setInterval(()=>{ loadTeams(true); }, 30000);
    return ()=>clearInterval(interval);
  },[loadTeams]);

  // Scanline ticker
  useEffect(()=>{
    const t=setInterval(()=>setTicker(x=>x+1),55);
    return ()=>clearInterval(t);
  },[]);

  // ── Save one team to Sheets ─────────────────────────────────
  const saveTeam = useCallback(async (updatedTeam)=>{
    setSaveStatus("SAVING...");
    // Optimistic update
    setTeams(prev=>prev.map(t=>t.id===updatedTeam.id?updatedTeam:t));
    try{
      if(API_CONFIGURED) await API.saveTeam(updatedTeam);
      setSaveStatus("SAVED"); setTimeout(()=>setSaveStatus(""),2000);
    }catch(err){
      setSaveStatus("ERR — " + err.message); setTimeout(()=>setSaveStatus(""),4000);
    }
  },[]);

  const commitEdit=(id,{name,group,scores,finaleScores,logo})=>{
    const updated={...teams.find(t=>t.id===id), name, group, scores, finaleScores:finaleScores||emptyScores(), logo:logo||""};
    saveTeam(updated);
    setEditId(null);
  };

  const resetAll=async()=>{
    if(!window.confirm("Reset ALL team scores to 0?\n\nThis resets BOTH leaderboard and finale scores.")) return;
    const zeroed=teams.map(t=>({...t,scores:emptyScores(),finaleScores:emptyScores()}));
    setTeams(zeroed);
    setSaveStatus("RESETTING...");
    try{
      if(API_CONFIGURED) await API.resetAll();
      setSaveStatus("RESET DONE"); setTimeout(()=>setSaveStatus(""),2000);
    }catch(err){
      setSaveStatus("ERR — " + err.message); setTimeout(()=>setSaveStatus(""),4000);
    }
  };

  const sorted=useMemo(()=>[...teams].sort((a,b)=>calcTotal(b.scores)-calcTotal(a.scores)),[teams]);
  const filteredLb=useMemo(()=>sorted.filter(t=>t.name.toLowerCase().includes(lbSearch.toLowerCase())||t.group.toLowerCase().includes(lbSearch.toLowerCase())),[sorted,lbSearch]);
  const filteredAdmin=useMemo(()=>teams.filter(t=>t.name.toLowerCase().includes(search.toLowerCase())||t.group.toLowerCase().includes(search.toLowerCase())||String(t.id).includes(search)),[teams,search]);

  const handleLogin=()=>{
    if(pwInput===ADMIN_PASSWORD){setAdminAuth(true);setPwError(false);setView("admin");}
    else setPwError(true);
  };

  const topScore=calcTotal((sorted[0]||{scores:emptyScores()}).scores);
  const scanPos=(ticker*2.5)%100;
  const selectedTeam=selectedId?teams.find(t=>t.id===selectedId):null;
  const selectedRank=selectedTeam?sorted.indexOf(selectedTeam)+1:null;

  // ── Loading screen ──────────────────────────────────────────
  if(loading) return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:"20px"}}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div style={{width:"54px",height:"54px",borderRadius:"50%",border:`2px solid ${C.o400}`,borderTopColor:C.b400,animation:"spin 0.9s linear infinite"}}/>
      <div style={{fontFamily:"'Orbitron',monospace",fontSize:"11px",background:`linear-gradient(90deg,${C.o400},${C.b300})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:".35em"}}>
        {API_CONFIGURED?"CONNECTING TO SHEETS...":"AIFF AGENT-A-THON"}
      </div>
      {!API_CONFIGURED&&(
        <div style={{maxWidth:"440px",background:C.bg2,border:`1px solid ${C.o400}55`,borderRadius:"8px",padding:"20px 24px",textAlign:"center"}}>
          <div style={{fontFamily:"'Orbitron',monospace",fontSize:"10px",color:C.o300,letterSpacing:".2em",marginBottom:"10px"}}>⚠ SCRIPT URL NOT SET</div>
          <div style={{fontSize:"11px",color:C.muted,lineHeight:"1.7"}}>Open this file in a text editor and replace <code style={{color:C.o300}}>YOUR_APPS_SCRIPT_URL_HERE</code> with your deployed Apps Script URL, then reload.</div>
        </div>
      )}
    </div>
  );

  // ── Setup banner when URL not yet configured ────────────────
  const SetupBanner = !API_CONFIGURED ? (
    <div style={{position:"fixed",top:"108px",left:"50%",transform:"translateX(-50%)",zIndex:99,width:"calc(100% - 48px)",maxWidth:"1200px",background:`${C.o400}18`,border:`1px solid ${C.o400}55`,borderRadius:"8px",padding:"10px 20px",display:"flex",alignItems:"center",gap:"12px",backdropFilter:"blur(10px)"}}>
      <span style={{fontSize:"16px"}}>⚠️</span>
      <div style={{fontSize:"11px",color:C.o200,flex:1}}>
        <span style={{fontFamily:"'Orbitron',monospace",fontSize:"9px",color:C.o300,letterSpacing:".15em",marginRight:"10px"}}>NOT CONNECTED TO SHEETS</span>
        Replace <code style={{background:C.bg,padding:"1px 6px",borderRadius:"2px",color:C.o300,fontSize:"10px"}}>YOUR_APPS_SCRIPT_URL_HERE</code> in this file with your deployed script URL. Scores are local-only until connected.
      </div>
    </div>
  ) : null;

  // ── Live sync status dot ────────────────────────────────────
  const SyncDot = (
    <div style={{display:"flex",alignItems:"center",gap:"6px",fontSize:"9px",color:netError?C.o400:C.muted,letterSpacing:".12em",cursor:"pointer"}} onClick={()=>loadTeams(true)} title="Click to refresh">
      <div style={{width:"6px",height:"6px",borderRadius:"50%",
        background:netError?"#FF7070":syncing?C.b300:C.o400,
        boxShadow:netError?"0 0 6px #FF7070":syncing?`0 0 8px ${C.b400}`:` 0 0 5px ${C.o400}`,
        animation:syncing?"spin 0.8s linear infinite":"pulse-o 2s infinite",
      }}/>
      {syncing?"SYNCING…":netError?"OFFLINE":lastSync?`LIVE · ${lastSync.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}`:"LIVE"}
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Share Tech Mono',monospace",position:"relative",overflowX:"hidden"}}>
      <GlobalCSS/>
      <div className="grid-bg"/>
      <div className="scanline-o" style={{top:`${scanPos}%`}}/>
      <div className="scanline-b" style={{top:`${(scanPos+47)%100}%`}}/>
      {SetupBanner}

      {/* HEADER */}
      <header style={{position:"fixed",top:"12px",left:"50%",transform:"translateX(-50%)",zIndex:100,width:"calc(100% - 48px)",maxWidth:"1200px",background:`linear-gradient(180deg,${C.bg}F0,${C.bg2}EE)`,backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",boxShadow:`0 0 0 1px ${C.o400}33, 0 0 0 1.5px ${C.b400}22, 0 8px 32px #00000066, 0 0 60px ${C.o400}0A`,borderRadius:"12px",border:`1px solid ${C.o400}33`,padding:"0 32px",display:"flex",alignItems:"center",justifyContent:"space-between",minHeight:"80px",flexWrap:"wrap",gap:"16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"18px"}}>
          <Logo/>
          <div>
            <div style={{fontFamily:"'Orbitron',monospace",fontSize:"28px",fontWeight:"900",letterSpacing:".14em",background:`linear-gradient(90deg,${C.o400} 0%,${C.o300} 25%,${C.b300} 65%,${C.b400} 100%)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1.1}}>AIFF AGENT-A-THON</div>
            <div style={{fontSize:"10px",color:C.muted,letterSpacing:".38em",marginTop:"4px",display:"flex",alignItems:"center",gap:"8px"}}>
              <span style={{display:"inline-block",width:"16px",height:"1px",background:`linear-gradient(90deg,${C.o400},transparent)`}}/>
              POWERED BY TELEKOM MALAYSIA
              <span style={{display:"inline-block",width:"16px",height:"1px",background:`linear-gradient(90deg,transparent,${C.b400})`}}/>
            </div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
          {SyncDot}
          <button className={`nav-btn ${view==="leaderboard"?"active-o":""}`} onClick={()=>setView("leaderboard")}>LEADERBOARD</button>
          <button className={`nav-btn ${view==="finale"?"active-finale":""}`} onClick={()=>setView("finale")} style={{
            borderColor: view==="finale"? C.gold : "#FFFFFF14",
            color: view==="finale"? C.gold : C.muted,
            background: view==="finale"? `${C.gold}15` : "transparent",
            boxShadow: view==="finale"? `0 0 18px ${C.gold}44` : "none",
          }}>⚡ FINALE</button>
          <button className={`nav-btn ${(view==="admin"||view==="login")?"active-o":""}`} onClick={()=>setView(adminAuth?"admin":"login")}>
            {adminAuth?"ADMIN ●":"ADMIN"}

        {/* ── LEADERBOARD ── */}

              const accentLt=rank%2===0?C.b300:C.o300;
